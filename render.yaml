services:
  - type: web
    name: prism
    runtime: python
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "python -m gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: MISTRAL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
